# ==============================
# Server Configuration
# ==============================
server.port=8080

# ==============================
# Database Configuration
# ==============================
spring.datasource.url=jdbc:mysql://localhost:3306/interview_simulator?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=ur password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==============================
# JPA / Hibernate
# ==============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ==============================
# JWT Configuration
# ==============================
app.jwt.secret=YourSuperSecretKeyHereMakeItLongAndSecureAtLeast256BitsForHS256Algorithm
app.jwt.expiration-ms=86400000

# ==============================
# Grog Api setup `
groq.api.key=api key 
groq.api.url=https://api.groq.com/openai/v1/chat/completions
# ==============================

# Static Resources
# ==============================
spring.web.resources.static-locations=classpath:/static/
spring.mvc.static-path-pattern=/**

# ==============================
# Logging
# ==============================
logging.level.com.interview.simulator=DEBUG
logging.level.org.springframework.security=WARN
