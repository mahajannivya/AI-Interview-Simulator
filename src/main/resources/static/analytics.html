<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analytics - Interview Simulator</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/dashboard.css">
</head>
<body>
<nav class="navbar">
    <div class="nav-brand">🤖 Interview Simulator</div>
    <div class="nav-links">
        <a href="/dashboard.html">Dashboard</a>
        <a href="/analytics.html" class="active">Analytics</a>
        <span class="nav-user" id="navUsername"></span>
        <button class="btn btn-outline btn-sm" onclick="logout()">Logout</button>
    </div>
</nav>

<div class="page-container">
    <h1 class="page-title">Your Analytics</h1>

    <!-- Stats Overview -->
    <div class="stats-row stats-row-4">
        <div class="stat-box">
            <span class="stat-num" id="totalInterviews">0</span>
            <span class="stat-label">Total Interviews</span>
        </div>
        <div class="stat-box">
            <span class="stat-num" id="completedInterviews">0</span>
            <span class="stat-label">Completed</span>
        </div>
        <div class="stat-box">
            <span class="stat-num" id="avgScore">—</span>
            <span class="stat-label">Avg Score</span>
        </div>
        <div class="stat-box">
            <span class="stat-num" id="bestCategory">—</span>
            <span class="stat-label">Best Topic</span>
        </div>
    </div>

    <!-- Score History Chart -->
    <section class="section">
        <h2 class="section-title">Score History</h2>
        <div class="chart-container">
            <canvas id="historyChart"></canvas>
            <div id="noHistoryMsg" class="empty-state" style="display:none">
                No completed interviews yet. Start practicing!
            </div>
        </div>
    </section>

    <!-- Category Performance -->
    <section class="section">
        <h2 class="section-title">Performance by Topic</h2>
        <div id="categoryBars" class="category-bars"></div>
    </section>

    <!-- Weak Areas -->
    <section class="section">
        <h2 class="section-title">Areas to Improve</h2>
        <div id="weakAreas" class="weak-areas-grid"></div>
    </section>
</div>

<script src="/js/auth.js"></script>
<script src="/js/analytics.js"></script>
</body>
</html>
