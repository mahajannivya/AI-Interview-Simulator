<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Interview Simulator</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/admin.css">
</head>
<body>
<nav class="navbar">
    <div class="nav-brand">🤖 Interview Simulator <span class="badge-admin">ADMIN</span></div>
    <div class="nav-links">
        <a href="/dashboard.html">Dashboard</a>
        <button class="btn btn-outline btn-sm" onclick="logout()">Logout</button>
    </div>
</nav>

<div class="page-container">
    <h1 class="page-title">Admin Panel</h1>

    <!-- Platform Stats -->
    <div class="stats-row">
        <div class="stat-box stat-box-admin">
            <span class="stat-num" id="totalUsers">0</span>
            <span class="stat-label">Total Users</span>
        </div>
        <div class="stat-box stat-box-admin">
            <span class="stat-num" id="totalSessions">0</span>
            <span class="stat-label">Total Sessions</span>
        </div>
    </div>

    <!-- Categories Management -->
    <section class="section">
        <div class="section-header">
            <h2 class="section-title">Manage Categories</h2>
            <button class="btn btn-primary btn-sm" onclick="showAddCategory()">
                + Add Category
            </button>
        </div>

        <div id="addCategoryForm" class="add-form" style="display:none">
            <input type="text" id="catName" placeholder="Category name" class="form-input">
            <input type="text" id="catDesc" placeholder="Description" class="form-input">
            <input type="text" id="catIcon" placeholder="Icon (emoji)" class="form-input small">
            <div class="form-actions">
                <button class="btn btn-outline btn-sm" onclick="hideAddCategory()">Cancel</button>
                <button class="btn btn-primary btn-sm" onclick="addCategory()">Save</button>
            </div>
        </div>

        <div id="categoriesTable" class="admin-table-wrap"></div>
    </section>

    <!-- Users List -->
    <section class="section">
        <h2 class="section-title">All Users</h2>
        <div id="usersTable" class="admin-table-wrap"></div>
    </section>
</div>

<script src="/js/auth.js"></script>
<script src="/js/admin.js"></script>
</body>
</html>
